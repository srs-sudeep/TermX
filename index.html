<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon — replace with your own in public/ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta — populated dynamically from user.config.ts via react-helmet or
         set at build time. These are sensible fallbacks. -->
    <meta name="description" content="Terminal-style portfolio" />
    <meta name="theme-color" content="#282a36" />

    <!-- Open Graph — replaced with real values in Phase 15 -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Prevent FOUC: block paint until the default theme vars are set.
         themeManager writes CSS variables onto <html> before first render. -->
    <style>
      :root {
        /* Dracula default — overwritten at runtime by themeManager */
        --bg: #282a36;
        --fg: #f8f8f2;
      }
      html,
      body {
        background-color: var(--bg);
        color: var(--fg);
      }
    </style>

    <title>termfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
